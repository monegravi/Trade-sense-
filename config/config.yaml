general:
  timezone: UTC
  timeframe: 1h
  data_dir: data
  db_path: data/market.duckdb
  history_lookback_hours: 2000

assets:
  - symbol: BTC/USDT
    exchange: binance
    type: crypto
  - symbol: ETH/USDT
    exchange: binance
    type: crypto
  - symbol: XAUUSD
    exchange: yfinance
    yfinance_ticker: XAUUSD=X
    type: commodity

features:
  indicators:
    use_all: true
  sentiment:
    enabled: true
  macro:
    enabled: true
    fred_series:
      - DGS10   # 10-Year Treasury Constant Maturity Rate
      - T10YIE  # 10-Year Breakeven Inflation Rate

model:
  name: autoformer
  horizon_hours: 24
  context_hours: 336
  optuna_trials: 20
  batch_size: 64
  max_epochs: 30
  learning_rate: 1e-3
  validation_ratio: 0.2
  test_ratio: 0.1
  early_stopping_patience: 5

backtest:
  fee_bps: 5           # 0.05%
  slippage_bps: 5      # 0.05%
  take_profit_pct: 0.02
  stop_loss_pct: 0.01
  signal_threshold: 0.003  # required predicted return to open position
  initial_cash: 10_000

notifications:
  telegram:
    enabled: true

schedule:
  daily_hour_utc: 00
  weekly_day_utc: Mon
  monthly_day: 1